<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Minds Mystic Healing — The 21-Day Reset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .popup-animate {
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="/" class="flex items-center group">
                <span class="text-slate-900 font-black text-xs tracking-[0.4em] uppercase italic group-hover:text-blue-600 transition-colors">
                    Divine Minds Mystic Healing
                </span>
            </a>
        </div>
    </header>

    <!-- Main Content (Images Only) -->
    <main class="flex-grow pt-20 flex flex-col">
        <section class="w-full">
            <img src="https://73cdi02hfx.ufs.sh/f/0x0XKSZ7lVQtFAEJvCey7tIar0TNZBWqznOLHY8RbvG23EQw" alt="Healing Vision" class="w-full h-auto block">
        </section>
        <section class="w-full">
            <img src="https://73cdi02hfx.ufs.sh/f/0x0XKSZ7lVQtmFn1bw66HykinMfa5bwu7XFUYDZIPNQqWlvJ" alt="The Reset" class="w-full h-auto block">
        </section>
        <section class="w-full">
            <img src="https://73cdi02hfx.ufs.sh/f/0x0XKSZ7lVQtsEe9CSahSXdliuvGkTz8woxRcnUPNAqW1yKY" alt="Purpose" class="w-full h-auto block">
        </section>
    </main>

    <!-- Footer -->
    <footer class="py-12 bg-white text-center border-t border-slate-100">
        <p class="text-[10px] font-black uppercase tracking-[0.5em] text-slate-300">
            Divine Minds Mystic Healing • © 2026
        </p>
    </footer>

    <!-- Announcement Popup -->
    <div id="popup-overlay" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm pointer-events-none opacity-0 transition-opacity duration-500">
        <div id="popup-content" class="relative w-full max-w-lg bg-white rounded-[32px] overflow-hidden shadow-3xl transform scale-90 translate-y-4 popup-animate">
            <button id="close-popup" class="absolute top-6 right-6 w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-400 hover:text-slate-900 transition-colors z-10">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <div class="p-16 text-center">
                <h3 class="text-2xl font-black text-slate-900 tracking-[0.3em] uppercase italic leading-none">
                    Coming Soon
                </h3>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('popup-overlay');
        const content = document.getElementById('popup-content');
        const closeBtn = document.getElementById('close-popup');

        function showPopup() {
            overlay.classList.remove('pointer-events-none');
            overlay.classList.add('opacity-100');
            content.classList.remove('scale-90', 'translate-y-4');
            content.classList.add('scale-100', 'translate-y-0');
        }

        function hidePopup() {
            overlay.classList.add('pointer-events-none');
            overlay.classList.remove('opacity-100');
            content.classList.add('scale-90', 'translate-y-4');
            content.classList.remove('scale-100', 'translate-y-0');
        }

        closeBtn.onclick = hidePopup;

        // Auto show after delay to match React AnnouncementPopup logic
        window.addEventListener('load', () => {
            setTimeout(showPopup, 1500);
        });
    </script>
</body>
</html>
